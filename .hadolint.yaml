# Hadolint configuration for ai-n8domata
#
# DL3008 (pin apt package versions) and DL3016 (pin npm package versions) are
# intentionally not enforced. Exact version pinning is brittle for these images
# (official node / python-slim bases, Puppeteer/Chromium, n8n) and would force
# constant, low-value churn whenever an upstream patch release ships.
#
# DL3015 stays enforced: every `apt-get install` uses --no-install-recommends.
failure-threshold: warning
ignored:
  - DL3008
  - DL3016
