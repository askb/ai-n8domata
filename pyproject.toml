# Vendored upstream code lives in git submodules under services/ (and the
# sadtalker/ patch file); the Python linters must only check this repo's own
# code, not the submodules.
[tool.black]
line-length = 88
force-exclude = '(^|/)services/|sadtalker/make_animation\.patched\.py'

[tool.isort]
profile = "black"
skip_glob = ["services/*", "*/services/*"]
extend_skip = ["sadtalker/make_animation.patched.py"]
