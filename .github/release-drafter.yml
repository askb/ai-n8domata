---
name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  - title: "🚀 Features"
    labels: ["feature", "enhancement"]
  - title: "🐛 Bug Fixes"
    labels: ["fix", "bugfix", "bug"]
  - title: "⚙️ CI / Build"
    labels: ["ci", "build"]
  - title: "📖 Documentation"
    labels: ["documentation", "docs"]
  - title: "🧰 Maintenance"
    labels: ["chore", "refactor", "dependencies"]

change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels: ["major", "breaking"]
  minor:
    labels: ["minor", "feature", "enhancement"]
  patch:
    labels: ["patch", "fix", "bugfix", "chore", "ci", "docs"]
  default: patch

autolabeler:
  - label: "feature"
    title: ["/^feat(\\(.+\\))?!?:/"]
  - label: "fix"
    title: ["/^fix(\\(.+\\))?!?:/"]
  - label: "documentation"
    title: ["/^docs(\\(.+\\))?!?:/"]
  - label: "ci"
    title: ["/^(ci|build)(\\(.+\\))?!?:/"]
  - label: "chore"
    title: ["/^(chore|refactor|test|style|perf)(\\(.+\\))?!?:/"]

template: |
  ## Changes

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
